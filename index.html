<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barrier Configurator</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
      
      #viewer-container { 
        flex: 7; 
        background: radial-gradient(circle at center, #ffffff 0%, #c1c8d1 100%); 
        position: relative; 
      }
      
      #ui-container { flex: 3; padding: 30px; background-color: #ffffff; border-left: 1px solid #ccc; box-sizing: border-box; overflow-y: auto; }
      
      /* Main viewer */
      model-viewer { width: 100%; height: 100%; }

      /* --- Standard Native AR Button --- */
      .ar-button {
        background-color: #0A0A0A;
        color: white;
        border-radius: 4px;
        border: none;
        position: absolute;
        bottom: 20px;
        right: 20px;
        padding: 14px 28px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: background-color 0.3s;
      }
      model-viewer[ar-status="presenting"] > .ar-button { display: none; }
      
      /* --- Desktop QR Widget --- */
      #desktop-qr-widget {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(255, 255, 255, 0.9);
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        text-align: center;
        z-index: 10;
      }
      #desktop-qr-widget p { font-size: 12px; color: #333; margin: 0 0 8px 0; font-weight: bold; }
      #desktop-qr-widget img { border-radius: 4px; }

      @media (max-width: 768px) {
        body { flex-direction: column; }
        #viewer-container { flex: 1; min-height: 50vh; }
        #ui-container { flex: 1; border-left: none; border-top: 1px solid #ccc; }
        
        /* Mobile Switch: Hide QR Code */
        #desktop-qr-widget { display: none; }
      }

      /* Live XYZ Axis Widget */
      #axis-widget-container {
        position: absolute; top: 20px; right: 20px;
        width: 60px; height: 60px;
        perspective: 400px; pointer-events: none;
      }
      #axis-scene { width: 100%; height: 100%; transform-style: preserve-3d; transform-origin: center center; }
      .axis { position: absolute; top: 50%; left: 50%; transform-origin: 0 0; }
      .axis-x { width: 30px; height: 3px; background: red; margin-top: -1.5px; }
      .axis-y { width: 3px; height: 30px; background: green; margin-left: -1.5px; transform: rotateZ(180deg); }
      .axis-z { width: 30px; height: 3px; background: blue; margin-top: -1.5px; transform: rotateY(-90deg); }
      .axis-label { position: absolute; font-size: 10px; font-weight: bold; color: #333; }
      .label-x { left: 35px; top: -5px; color: red; }
      .label-y { left: -4px; top: 35px; color: green; }
      .label-z { left: 35px; top: -5px; color: blue; transform: rotateY(90deg); }

      /* UI Controls */
      .control-group { margin-bottom: 20px; }
      label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px; color: #333; }
      input[type="range"] { width: 100%; cursor: pointer; }
      
      /* Custom RAL Dropdown */
      .custom-select { position: relative; font-size: 14px; user-select: none; margin-bottom: 15px; }
      .select-selected { background-color: #f1f1f1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; }
      .select-selected:after { content: '▼'; position: absolute; right: 15px; font-size: 10px; }
      .select-items { position: absolute; background-color: #fff; border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; z-index: 99; max-height: 250px; overflow-y: auto; display: none; margin-top: 4px; }
      .select-search { padding: 8px; position: sticky; top: 0; background: #fff; border-bottom: 1px solid #eee; }
      .select-search input { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
      .select-item { padding: 10px; cursor: pointer; display: flex; align-items: center; border-bottom: 1px solid #eee; }
      .select-item:hover { background-color: #f9f9f9; }
      .color-swatch { width: 20px; height: 20px; border-radius: 3px; margin-right: 10px; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    
    <div id="viewer-container">
      
      <model-viewer 
        id="barrier-model"
        src="Final Reduced Model_v8.glb" 
        orientation="0deg 0deg 0deg" 
        camera-orbit="-45deg 75deg auto"
        camera-controls 
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1.2"
        ar
        ar-modes="webxr scene-viewer quick-look">
        
        <button slot="ar-button" class="ar-button">
          View in your space
        </button>
      </model-viewer>

      <div id="desktop-qr-widget">
        <p>Scan to view in AR</p>
        <img id="dynamic-qr" src="" alt="QR Code" width="120" height="120">
      </div>

      <div id="axis-widget-container">
        <div id="axis-scene">
          <div class="axis axis-x"><span class="axis-label label-x">X</span></div>
          <div class="axis axis-y"><span class="axis-label label-y">Y</span></div>
          <div class="axis axis-z"><span class="axis-label label-z">Z</span></div>
        </div>
      </div>
    </div>

    <div id="ui-container">
      <h2>Barrier Configurator</h2>
      
      <div class="control-group">
        <label for="armLength">Barrier Length: <span id="lengthValue">4500</span> mm</label>
        <input type="range" id="armLength" min="3000" max="8000" step="100" value="4500">
      </div>
      <hr style="margin: 20px 0;">

      <div class="control-group">
        <label>Body Color</label>
        <div class="custom-select" id="ral-body" data-target="Mat_Body"></div>
      </div>

      <div class="control-group">
        <label>Arm Color</label>
        <div class="custom-select" id="ral-arm" data-target="Mat_Arm"></div>
      </div>

      <div class="control-group">
        <label>Catcher Color</label>
        <div class="custom-select" id="ral-catcher" data-target="Mat_Catcher"></div>
      </div>

      <div class="control-group">
        <label>Stickers Color</label>
        <div class="custom-select" id="ral-stickers" data-target="Mat_Stickers"></div>
      </div>
    </div>

    <script>
      const modelViewer = document.querySelector('#barrier-model');
      const armSlider = document.querySelector('#armLength');
      const lengthValueDisplay = document.querySelector('#lengthValue');
      const axisScene = document.querySelector('#axis-scene');

      const BASE_LENGTH = 4500; 

      // Initialize Desktop QR Code
      document.getElementById('dynamic-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}`;

      const ralColors = [
        { code: "1003", name: "Signal Yellow", hex: "#E5A715" },
        { code: "1023", name: "Traffic Yellow", hex: "#FAD201" },
        { code: "3020", name: "Traffic Red", hex: "#CC0605" },
        { code: "5010", name: "Gentian Blue", hex: "#004F7C" },
        { code: "6005", name: "Moss Green", hex: "#0F4C3A" },
        { code: "7016", name: "Anthracite Grey", hex: "#373F43" },
        { code: "7035", name: "Light Grey", hex: "#C5C7C4" },
        { code: "9003", name: "Signal White", hex: "#ECECE7" },
        { code: "9005", name: "Jet Black", hex: "#0A0A0A" }
      ];

      // Brightness-corrected conversion logic
      function hexToRgba(hex) {
        let r = parseInt(hex.slice(1, 3), 16) / 255;
        let g = parseInt(hex.slice(3, 5), 16) / 255;
        let b = parseInt(hex.slice(5, 7), 16) / 255;
        r = Math.pow(r, 2.2);
        g = Math.pow(g, 2.2);
        b = Math.pow(b, 2.2);
        return [r, g, b, 1.0];
      }

      // Live Axis Sync
      modelViewer.addEventListener('camera-change', () => {
        const orbit = modelViewer.getCameraOrbit();
        const thetaDeg = orbit.theta * (180 / Math.PI);
        const phiDeg = orbit.phi * (180 / Math.PI);
        axisScene.style.transform = `rotateX(${phiDeg - 90}deg) rotateY(${-thetaDeg}deg)`;
      });

      // Dimensions & Math
      armSlider.addEventListener('input', (event) => {
        const newLength = parseFloat(event.target.value);
        lengthValueDisplay.textContent = newLength;
        const scaleMultiplier = newLength / BASE_LENGTH;

        const internalSymbol = Object.getOwnPropertySymbols(modelViewer.model).find(s => s.description === 'hierarchy' || s.description === 'primitives');
        if (!internalSymbol) return; 
        
        const nodes = modelViewer.model[internalSymbol];
        const armNode = nodes.find(n => n.name === 'Barrier_Arm')?.mesh;
        const catcherNode = nodes.find(n => n.name === 'Catcher')?.mesh;

        if (armNode && catcherNode) {
          if (catcherNode.userData.originalPos === undefined) {
            catcherNode.userData.originalPos = catcherNode.position.clone();
            armNode.userData.originalPos = armNode.position.clone();
          }

          armNode.scale.set(scaleMultiplier, 1, 1); 
          const distanceToHinge = catcherNode.userData.originalPos.x - armNode.userData.originalPos.x;
          const physicalGrowth = distanceToHinge * (scaleMultiplier - 1);
          catcherNode.position.x = catcherNode.userData.originalPos.x + physicalGrowth;
        }
        modelViewer.updateFraming();
      });

      // Custom RAL UI Searchable Dropdowns Builder
      function buildRalDropdowns() {
        const selects = document.querySelectorAll('.custom-select');
        
        selects.forEach(select => {
          const targetMaterial = select.getAttribute('data-target');
          const defaultColor = ralColors[8]; // Jet Black (9005) default UI match

          const selectedDiv = document.createElement('div');
          selectedDiv.className = 'select-selected';
          selectedDiv.innerHTML = `<div class="color-swatch" style="background-color: ${defaultColor.hex};"></div> RAL ${defaultColor.code} - ${defaultColor.name}`;
          
          const itemsDiv = document.createElement('div');
          itemsDiv.className = 'select-items';
          
          const searchContainer = document.createElement('div');
          searchContainer.className = 'select-search';
          const searchInput = document.createElement('input');
          searchInput.type = 'text';
          searchInput.placeholder = 'Search RAL or Color...';
          searchContainer.appendChild(searchInput);
          itemsDiv.appendChild(searchContainer);

          const renderColors = (filterText = "") => {
            while (itemsDiv.children.length > 1) {
              itemsDiv.removeChild(itemsDiv.lastChild);
            }
            
            const filtered = ralColors.filter(c => 
              c.code.includes(filterText) || c.name.toLowerCase().includes(filterText.toLowerCase())
            );

            filtered.forEach(color => {
              const item = document.createElement('div');
              item.className = 'select-item';
              item.innerHTML = `<div class="color-swatch" style="background-color: ${color.hex};"></div> RAL ${color.code} - ${color.name}`;
              
              item.addEventListener('click', () => {
                selectedDiv.innerHTML = `<div class="color-swatch" style="background-color: ${color.hex};"></div> RAL ${color.code} - ${color.name}`;
                itemsDiv.style.display = 'none';
                
                if (modelViewer.model) {
                  const mat = modelViewer.model.materials.find(m => m.name === targetMaterial);
                  if (mat) mat.pbrMetallicRoughness.setBaseColorFactor(hexToRgba(color.hex));
                }
              });
              itemsDiv.appendChild(item);
            });
          };

          renderColors();

          searchInput.addEventListener('input', (e) => renderColors(e.target.value));

          selectedDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = itemsDiv.style.display === 'block';
            document.querySelectorAll('.select-items').forEach(el => el.style.display = 'none'); 
            itemsDiv.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) searchInput.focus();
          });

          select.appendChild(selectedDiv);
          select.appendChild(itemsDiv);
        });

        document.addEventListener('click', () => {
          document.querySelectorAll('.select-items').forEach(el => el.style.display = 'none');
        });
      }

      buildRalDropdowns();
    </script>
  </body>
</html>
